<div class="card">
    <h2>Statystyki</h2>
</div>

<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
    <div class="card">
        <p style="color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Pojazdy</p>
        <h2 style="font-size: 32px; margin-top: 8px;">{{ liczba_pojazdow }}</h2>
    </div>
    <div class="card">
        <p style="color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Rezerwacje</p>
        <h2 style="font-size: 32px; margin-top: 8px;">{{ liczba_rezerwacji }}</h2>
    </div>
    <div class="card">
        <p style="color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Kontrahenci</p>
        <h2 style="font-size: 32px; margin-top: 8px;">0</h2>
    </div>
    <div class="card">
        <p style="color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Polisy</p>
        <h2 style="font-size: 32px; margin-top: 8px;">{{ liczba_polis }}</h2>
    </div>
</div>

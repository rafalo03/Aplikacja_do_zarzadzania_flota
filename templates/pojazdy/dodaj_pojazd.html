{% extends 'base.html' %}

{% block title %}Dodaj pojazd{% endblock %}
{% block page_title %}Dodaj pojazd{% endblock %}

{% block content %}
<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <p class="form-error">{{ field.errors }}</p>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        <div style="margin-top: 20px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Zapisz pojazd</button>
            <a href="{% url 'pojazdy' %}" class="btn btn-secondary">Anuluj</a>
        </div>
    </form>
</div>
{% endblock %}
